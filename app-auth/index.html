<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in to Archie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary:    #FBF8F4;
      --bg-secondary:  #F7EFE4;
      --bg-card:       #FFFFFF;
      --accent:        #E08A5B;
      --accent-hover:  #CC7647;
      --accent-subtle: #FBE4D3;
      --text-primary:  #4A423A;
      --text-secondary:#8C8177;
      --text-muted:    #A09489;
      --border:        #EFE4D6;
      --field-bg:      #F7EFE4;
      --radius:        12px;
      --radius-sm:     8px;
      --transition:    0.25s ease;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary:    #2A2521;
        --bg-secondary:  #332C26;
        --bg-card:       #3A3229;
        --accent:        #EDA277;
        --accent-hover:  #E08A5B;
        --accent-subtle: #4A392C;
        --text-primary:  #F5EFE6;
        --text-secondary:#B7AA9B;
        --text-muted:    #8C8177;
        --border:        #4C4136;
        --field-bg:      #332C26;
      }
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    /* ── Card ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    /* ── Brand ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .brand-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .brand-icon svg { display: block; }
    .brand-name {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    /* ── Heading ── */
    .card-title {
      font-family: Georgia, serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1.25;
      margin-bottom: 6px;
    }
    .card-subtitle {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* ── Status message ── */
    .status {
      display: none;
      font-size: 0.875rem;
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .status.info {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-subtle);
      color: var(--accent-hover);
    }
    .status.error {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #FEE2E2;
      color: #B91C1C;
    }
    @media (prefers-color-scheme: dark) {
      .status.error { background: #3B1515; color: #F87171; }
    }
    .status-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Buttons ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      border: none;
      text-decoration: none;
    }
    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none !important;
    }
    .btn-primary {
      background: var(--accent);
      color: #2A2521;
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(224,138,91,0.35);
    }
    .btn-outline {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn-outline:hover:not(:disabled) {
      background: var(--bg-secondary);
      border-color: var(--text-muted);
      transform: translateY(-1px);
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 0.8125rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Email form ── */
    #email-form { display: none; }
    #email-form.visible { display: block; }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      background: var(--field-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 13px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9375rem;
      color: var(--text-primary);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(224,138,91,0.18);
    }

    .form-toggle {
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-top: 14px;
    }
    .form-toggle button {
      background: none;
      border: none;
      color: var(--accent);
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-decoration-color: transparent;
      transition: text-decoration-color var(--transition);
    }
    .form-toggle button:hover { text-decoration-color: var(--accent); }

    /* ── Error-only state (no callback) ── */
    #error-state { display: none; }
    #error-state.visible { display: block; }
    #sign-in-ui.hidden { display: none; }

    /* ── Footer note ── */
    .card-footer {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 0.8125rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
    }
    .card-footer a {
      color: var(--text-secondary);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .card-footer a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 2L12.5 7.5H18L13.5 11L15.5 17L10 13.5L4.5 17L6.5 11L2 7.5H7.5L10 2Z" fill="#2A2521"/>
        </svg>
      </div>
      <span class="brand-name">Archie</span>
    </div>

    <!-- No-callback error state -->
    <div id="error-state">
      <div class="status error" style="display:flex; margin-bottom:0;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">
          <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 4.5V8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="8" cy="11" r="0.75" fill="currentColor"/>
        </svg>
        Please open this page from the Archie desktop app to sign in.
      </div>
    </div>

    <!-- Main sign-in UI -->
    <div id="sign-in-ui">
      <h1 class="card-title">Sign in to Archie</h1>
      <p class="card-subtitle">Connect your account to continue in the app.</p>

      <!-- Status message -->
      <div id="status" class="status" role="status" aria-live="polite"></div>

      <!-- Google -->
      <button class="btn btn-outline" id="btn-google" type="button">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615Z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="#34A853"/>
          <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332Z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58Z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider">or</div>

      <!-- Email toggle -->
      <button class="btn btn-outline" id="btn-show-email" type="button">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1.5" y="3.5" width="15" height="11" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M1.5 5.5L9 10L16.5 5.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Continue with Email
      </button>

      <!-- Email form (hidden until btn-show-email clicked) -->
      <form id="email-form" novalidate>
        <div style="margin-top:16px;"></div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" name="email"
                 placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password"
                 placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button class="btn btn-primary" id="btn-email-submit" type="submit">
          Sign In
        </button>
        <div class="form-toggle">
          <span id="toggle-label">No account yet?</span>
          <button type="button" id="btn-toggle-mode">Create one</button>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="card-footer">
      By signing in you agree to our
      <a href="/terms-of-service/" target="_blank">Terms</a> and
      <a href="/privacy-policy/" target="_blank">Privacy Policy</a>.
    </div>

  </div>

  <script type="module">
    import { initializeApp }              from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    // ── Firebase init ──────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyA46RqJV4tcJD8h4mdcSZ26dDoikA9L64M",
      authDomain:        "archie-77170.firebaseapp.com",
      projectId:         "archie-77170",
      storageBucket:     "archie-77170.firebasestorage.app",
      messagingSenderId: "516396797258",
      appId:             "1:516396797258:web:362cf2815128f3c82345b3"
    };
    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ── Read & validate callback param ─────────────────────────────────────
    const params   = new URLSearchParams(window.location.search);
    const callback = params.get('callback');

    if (!callback || !/^https?:\/\/127\.0\.0\.1(:\d+)?/.test(callback)) {
      document.getElementById('error-state').classList.add('visible');
      document.getElementById('sign-in-ui').classList.add('hidden');
      // Hide footer since there's nothing to do
      document.querySelector('.card-footer').style.display = 'none';
      throw new Error('No valid callback param — halting.');
    }

    // ── Helpers ────────────────────────────────────────────────────────────
    const statusEl = document.getElementById('status');

    function setStatus(type, text, spinner = false) {
      statusEl.className = `status ${type}`;
      statusEl.style.display = 'flex';
      statusEl.innerHTML = spinner
        ? `<span class="status-spinner" aria-hidden="true"></span>${text}`
        : `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0" aria-hidden="true">
             ${ type === 'error'
               ? '<circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M8 4.5V8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="11" r="0.75" fill="currentColor"/>'
               : '<circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M5.5 8l2 2 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
             }
           </svg>${text}`;
    }

    function clearStatus() {
      statusEl.className = 'status';
      statusEl.style.display = 'none';
      statusEl.innerHTML = '';
    }

    function setAllDisabled(disabled) {
      document.querySelectorAll('button, input').forEach(el => {
        el.disabled = disabled;
      });
    }

    async function handleUser(userCredential) {
      setStatus('info', 'Returning to Archie…', true);
      const user     = userCredential.user;
      const idToken  = await user.getIdToken();
      const dest     = new URL(callback);
      dest.searchParams.set('id_token',      idToken);
      dest.searchParams.set('refresh_token', user.refreshToken);
      dest.searchParams.set('email',         user.email  ?? '');
      dest.searchParams.set('uid',           user.uid);
      window.location.href = dest.toString();
    }

    function friendlyError(err) {
      const map = {
        'auth/popup-closed-by-user':    'Sign-in popup was closed. Please try again.',
        'auth/popup-blocked':           'Popup was blocked by your browser. Please allow popups and try again.',
        'auth/cancelled-popup-request': null,           // silent — user opened another popup
        'auth/user-not-found':          'No account found for that email. Use "Create one" below.',
        'auth/wrong-password':          'Incorrect password. Please try again.',
        'auth/invalid-credential':      'Incorrect email or password.',
        'auth/email-already-in-use':    'An account with that email already exists. Try signing in instead.',
        'auth/weak-password':           'Password must be at least 6 characters.',
        'auth/invalid-email':           'Please enter a valid email address.',
        'auth/too-many-requests':       'Too many attempts. Please wait a moment and try again.',
        'auth/network-request-failed':  'Network error. Check your connection and try again.',
      };
      return map[err.code] ?? `Something went wrong (${err.code ?? err.message}). Please try again.`;
    }

    // ── Google sign-in ─────────────────────────────────────────────────────
    document.getElementById('btn-google').addEventListener('click', async () => {
      clearStatus();
      setAllDisabled(true);
      setStatus('info', 'Signing you in…', true);
      try {
        const result = await signInWithPopup(auth, new GoogleAuthProvider());
        await handleUser(result);
      } catch (err) {
        setAllDisabled(false);
        const msg = friendlyError(err);
        if (msg) setStatus('error', msg);
        else clearStatus();
      }
    });

    // ── Email form toggle ──────────────────────────────────────────────────
    const emailForm    = document.getElementById('email-form');
    const btnShowEmail = document.getElementById('btn-show-email');
    const btnSubmit    = document.getElementById('btn-email-submit');
    const toggleLabel  = document.getElementById('toggle-label');
    const btnToggle    = document.getElementById('btn-toggle-mode');
    let   isCreateMode = false;

    btnShowEmail.addEventListener('click', () => {
      emailForm.classList.add('visible');
      btnShowEmail.style.display = 'none';
      document.getElementById('email').focus();
    });

    btnToggle.addEventListener('click', () => {
      isCreateMode = !isCreateMode;
      if (isCreateMode) {
        btnSubmit.textContent  = 'Create Account';
        toggleLabel.textContent = 'Already have an account?';
        btnToggle.textContent   = 'Sign in';
        document.getElementById('password').autocomplete = 'new-password';
      } else {
        btnSubmit.textContent  = 'Sign In';
        toggleLabel.textContent = 'No account yet?';
        btnToggle.textContent   = 'Create one';
        document.getElementById('password').autocomplete = 'current-password';
      }
      clearStatus();
    });

    // ── Email form submit ──────────────────────────────────────────────────
    emailForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearStatus();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        setStatus('error', 'Please enter your email and password.');
        return;
      }

      setAllDisabled(true);
      setStatus('info', 'Signing you in…', true);

      try {
        let result;
        if (isCreateMode) {
          result = await createUserWithEmailAndPassword(auth, email, password);
        } else {
          result = await signInWithEmailAndPassword(auth, email, password);
        }
        await handleUser(result);
      } catch (err) {
        setAllDisabled(false);
        setStatus('error', friendlyError(err));
      }
    });
  </script>
</body>
</html>
