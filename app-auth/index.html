<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in to Archie</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FBF8F4;
      font-family: 'Avenir Next', 'Segoe UI', system-ui, sans-serif;
      color: #4A423A;
      overflow: hidden;
      position: relative;
    }
    .glow {
      position: fixed;
      top: 33%; left: 50%;
      transform: translate(-50%, -50%);
      width: 500px; height: 500px;
      border-radius: 50%;
      background: #E08A5B;
      opacity: 0.07;
      filter: blur(140px);
      pointer-events: none;
    }
    .card {
      position: relative;
      width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(74,66,58,0.14);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 16px 36px rgba(74,66,58,0.10);
    }
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .byline {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #A09489;
    }
    .divider {
      width: 100%;
      height: 1px;
      background: rgba(74,66,58,0.14);
    }
    .intro {
      text-align: center;
    }
    .intro h1 {
      font-family: 'Avenir Next', 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #4A423A;
    }
    .intro p {
      font-size: 13px;
      color: #8C8177;
      line-height: 1.55;
    }
    .btn {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      border: none;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      transition: opacity 0.15s, transform 0.15s;
      font-family: inherit;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0) scale(0.985); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-primary {
      background: #E08A5B;
      color: #2A2521;
    }
    .btn-secondary {
      background: rgba(74,66,58,0.07);
      color: #4A423A;
    }
    .divider-text {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
      color: #A09489;
      font-size: 12px;
    }
    .divider-text::before, .divider-text::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(74,66,58,0.14);
    }
    .fields {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }
    input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border-radius: 10px;
      border: 1px solid rgba(74,66,58,0.18);
      background: #fff;
      color: #4A423A;
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      border-color: #E08A5B;
      box-shadow: 0 0 0 3px rgba(224,138,91,0.15);
    }
    #status {
      font-size: 12px;
      min-height: 1.2em;
      color: #8C8177;
      text-align: center;
    }
    #status.error { color: #c0392b; }
    .email-section { display: none; width: 100%; }
    .email-section.visible { display: flex; flex-direction: column; gap: 8px; }
    .forgot-link {
      background: none;
      border: none;
      padding: 0;
      align-self: center;
      font-family: inherit;
      font-size: 12px;
      color: #8C8177;
      cursor: pointer;
    }
    .forgot-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">

    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2300 900" style="height:64px;width:auto;display:block;">
        <g transform="translate(-190,-35)">
          <path fill="#E08A5E" fill-rule="evenodd" d="M 512,85 L 200,850 L 512,712 L 824,850 Z M 512,272 L 384,616 L 640,616 Z"/>
          <polygon fill="#E08A5E" points="328,887 512,727 696,887"/>
        </g>
        <text x="650" y="650" font-family="Georgia, serif" font-size="590" font-weight="bold" fill="#E08A5E" dominant-baseline="middle">rchie</text>
      </svg>
      <span class="byline">by Otian AI</span>
    </div>

    <div class="divider"></div>

    <div class="intro">
      <h1>Sign in to Archie</h1>
      <p>Connect your account to continue in the app.</p>
    </div>

    <div style="display:flex;flex-direction:column;gap:8px;width:100%;">
      <button class="btn btn-primary" id="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615Z" fill="rgba(42,37,33,0.7)"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="rgba(42,37,33,0.7)"/>
          <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332Z" fill="rgba(42,37,33,0.7)"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58Z" fill="rgba(42,37,33,0.7)"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider-text">or</div>

      <button class="btn btn-secondary" id="btn-show-email">Continue with Email</button>
    </div>

    <div class="email-section" id="email-section">
      <div class="fields">
        <input type="email" id="email" placeholder="Email address" autocomplete="email" />
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
      </div>
      <button class="btn btn-primary" id="btn-signin">Sign in</button>
      <button class="btn btn-secondary" id="btn-signup">Create account</button>
      <button class="forgot-link" id="btn-forgot">Forgot password?</button>
    </div>

    <div id="status"></div>

    <p style="margin-top:20px;font-size:11px;color:#A09489;text-align:center;line-height:1.5;">&copy; 2026 Otian AI LLC. All rights reserved.<br />Otian&trade; and Archie&trade; are trademarks of Otian AI LLC.</p>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    sendPasswordResetEmail,
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA46RqJV4tcJD8h4mdcSZ26dDoikA9L64M",
    authDomain: "archie-77170.firebaseapp.com",
    projectId: "archie-77170",
    storageBucket: "archie-77170.firebasestorage.app",
    messagingSenderId: "516396797258",
    appId: "1:516396797258:web:362cf2815128f3c82345b3"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const params = new URLSearchParams(window.location.search);
  const callbackUrl = params.get("callback");
  const appState = params.get("state") || "";
  const statusEl = document.getElementById("status");

  function setStatus(msg, type = "") {
    statusEl.textContent = msg;
    statusEl.className = type;
  }

  async function handleUser(user) {
    if (!callbackUrl) {
      setStatus("No callback URL — open this page from the Archie app.", "error");
      return;
    }
    setStatus("Signing you in…");
    try {
      const idToken = await user.getIdToken(true);
      setStatus("Returning to Archie…");
      // Deliver the tokens to Archie's loopback by POSTing a form — NOT a GET redirect. A GET would
      // put the long-lived refresh token in the URL, where it is written to the browser's history
      // and recoverable long after. A form POST carries the tokens in the request body instead, so
      // nothing sensitive appears in the address bar or history. Values are set raw; the browser
      // form-encodes them once on submit and Archie decodes them once.
      const form = document.createElement("form");
      form.method = "POST";
      form.action = callbackUrl;
      const fields = {
        id_token: idToken,
        refresh_token: user.refreshToken,
        email: user.email || "",
        uid: user.uid,
        state: appState,
      };
      for (const [name, value] of Object.entries(fields)) {
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = name;
        input.value = value;
        form.appendChild(input);
      }
      document.body.appendChild(form);
      form.submit();
    } catch (e) {
      setStatus("Error: " + e.message, "error");
    }
  }

  document.getElementById("btn-google").addEventListener("click", async () => {
    try {
      const result = await signInWithPopup(auth, new GoogleAuthProvider());
      await handleUser(result.user);
    } catch (e) {
      if (e.code !== "auth/popup-closed-by-user") setStatus(e.message, "error");
    }
  });

  document.getElementById("btn-show-email").addEventListener("click", () => {
    document.getElementById("btn-show-email").style.display = "none";
    document.getElementById("email-section").classList.add("visible");
    document.getElementById("email").focus();
  });

  document.getElementById("btn-signin").addEventListener("click", async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    if (!email || !password) { setStatus("Enter your email and password.", "error"); return; }
    setStatus("Signing in…");
    try {
      const result = await signInWithEmailAndPassword(auth, email, password);
      await handleUser(result.user);
    } catch (e) { setStatus(e.message, "error"); }
  });

  document.getElementById("btn-signup").addEventListener("click", async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    if (!email || !password) { setStatus("Enter your email and password.", "error"); return; }
    setStatus("Creating account…");
    try {
      const result = await createUserWithEmailAndPassword(auth, email, password);
      await handleUser(result.user);
    } catch (e) { setStatus(e.message, "error"); }
  });

  document.getElementById("btn-forgot").addEventListener("click", async () => {
    const email = document.getElementById("email").value.trim();
    if (!email) { setStatus("Enter your email above first.", "error"); return; }
    setStatus("Sending reset email…");
    try {
      await sendPasswordResetEmail(auth, email);
      setStatus("Reset email sent — check your inbox, then come back and sign in.");
    } catch (e) { setStatus(e.message, "error"); }
  });

  document.getElementById("password").addEventListener("keydown", (e) => {
    if (e.key === "Enter") document.getElementById("btn-signin").click();
  });
</script>
</body>
</html>
