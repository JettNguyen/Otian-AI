<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in to Archie | Otian AI</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="../assets/icon-1024-dark.svg" type="image/svg+xml" />
  <!-- /app-auth is retired. Sign-in — with the account's second factor — lives on /login. The Archie
       desktop app opens this page as /app-auth?callback=http://127.0.0.1:{port}&state=… and waits for
       the token POST; forwarding to /login while preserving that query string keeps the loopback
       hand-off working for every already-installed build, with no app rebuild needed. Runs in <head>
       before anything renders, so the redirect is instant. -->
  <script>
    (function () {
      var qs = window.location.search || "";
      var hash = window.location.hash || "";
      window.location.replace("/login/" + qs + hash);
    })();
  </script>
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    body { display: flex; min-height: 100vh; align-items: center; justify-content: center; margin: 0; }
    .redir { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-secondary); font-size: 0.95rem; text-align: center; padding: 24px; }
    .redir a { color: var(--accent); }
  </style>
</head>
<body>
  <p class="redir">Taking you to sign in&hellip; <a href="/login/">Continue</a> if this doesn&rsquo;t happen automatically.</p>
</body>
</html>
